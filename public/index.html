<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Policy Bot</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <h2>HR Policy Bot (Llama 3.2)</h2>
  <div id="chat"></div>
  <input type="text" id="question" placeholder="Ask about PTO, Sick Leave..." style="width:80%">
  <button onclick="askBot()">Send</button>

  <script>
    async function askBot() {
      const q = document.getElementById('question').value;
      const res = await fetch('http://localhost:3000/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q })
      });
      const data = await res.json();
      document.getElementById('chat').innerHTML += `<p><b>You:</b> ${q}</p><p><b>Bot:</b> ${data.answer}</p>`;
    }
  </script>
</body>
</html>
